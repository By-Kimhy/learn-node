<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <title>Node Js</title>
    <style>
        #demo {
            width: 300px;
            height: 300px;
            margin: 20px;
            background-color: red;
        }

        ul {
            list-style: none;
            padding: 0%;
            margin: 0%;
        }

        ul li {
            padding: 10px;
            margin: 10px;
            display: flex;
            align-items: center;
            padding-block: 10px;
            width: 50%;
            justify-content: space-between;
            background-color: #eee;
        }

        ul li.active {
            background-color: skyblue;
        }

        ul li img {
            display: block;
            width: 100px;
            object-fit: contain;
        }

        ul li:hover {
            background-color: #ccc;
            cursor: pointer;
        }
    </style>
</head>

<body>
    <div id="app">
        <input type="button" value="Hide/Show" @click="hideShow()">
        <div id="demo" v-if="isShow">

        </div>
        <ul>
            <li v-for="item in itemList">
                {{ item }}
            </li><br>
            <li v-for="item,i in itemList">
                {{ item }}-{{ i }}
            </li><br>

            <li class="a" :class="{'active':data.isActive}" v-for="data,i in objlist" :key="data.id" @mouseover="newImg(i)"
                @mouseout="oldImg(i)">
                {{ data.id }} - {{ data.name }} - <img :src="data.img" alt="{{ data.name }}">
            </li>
        </ul>

    </div>



</body>

<script src="index.js"></script>

</html>
