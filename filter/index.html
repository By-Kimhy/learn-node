<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <title>Vue Js</title>

    <style>
        #demo {
            width: 300px;
            height: 300px;
            margin: 20px;
            background-color: red;
        }

        ul {
            list-style: none;
            padding: 0%;
            margin: 0%;
        }

        ul li {
            padding: 10px;
            margin: 10px;
            display: flex;
            align-items: center;
            padding-block: 10px;
            width: 50%;
            justify-content: space-between;
            background-color: #eee;
        }

        ul li.active {
            background-color: skyblue;
        }

        ul li img {
            display: block;
            width: 100px;
            object-fit: contain;
        }

        ul li:hover {
            background-color: #ccc;
            cursor: pointer;
        }
    </style>
</head>

<body>
    <div id="app">
        <!-- <ul>
            <li v-for='(item) in itemList'>
                {{item}}
            </li>
        </ul> -->

        <ul>
            <li v-for="(item) in filterItem">
                {{item}}
            </li>
        </ul>

    </div>

</body>

<script src="index.js"></script>

</html>
